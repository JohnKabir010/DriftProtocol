worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","method":"$request_method","uri":"$request_uri",'
    '"status":$status,"bytes":$body_bytes_sent,"ua":"$http_user_agent",'
    '"ref":"$http_referer","rt":"$request_time","upstream":"$upstream_addr"}';

  access_log /var/log/nginx/access.log json_combined;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1024;
  server_tokens off;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  upstream api_upstream   { server api:4000; keepalive 32; }
  upstream web_upstream   { server web:3000; keepalive 16; }
  upstream ws_upstream    { server realtime:2567; }

  server {
    listen 80;
    server_name _;

    # Health check (bypasses rate limiting)
    location = /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # API
    location /v1/ {
      limit_req zone=api burst=60 nodelay;

      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;
    }

    # Auth endpoints (stricter rate limit)
    location ~ ^/v1/auth/ {
      limit_req zone=auth burst=3 nodelay;

      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket (Colyseus realtime)
    location /colyseus/ {
      proxy_pass http://ws_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s; # long-lived WS connections
    }

    # Next.js web app (catch-all)
    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Next.js HMR websocket in dev (production: this path is never hit)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
