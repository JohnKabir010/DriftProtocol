[workspace]
resolver = "2"
members = ["marketplace-escrow"]
# Phase-5 additions: tournament-pool, faction-treasury, district-registry,
# asset-registry, rep-attest (see docs/01-MASTER-PLAN.md §8).

[workspace.dependencies]
soroban-sdk = "21.7.6"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true
